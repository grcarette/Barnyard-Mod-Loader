name: Build&Release Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            archive: zip

          - rid: linux-x64
            archive: tar.gz

          - rid: osx-x64
            archive: tar.gz

          - rid: osx-arm64
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Publish
        run: |
          dotnet publish \
            UCHModLoader.App/UCHModLoader.App.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained \
            -p:PublishSingleFile=true \
            --output publish/${{ matrix.rid }}

      - name: Package
        # Archives are named after the app + tag (Barnyard-v1.1.0-win-x64.zip),
        # with the files at the archive ROOT — extracting over an existing
        # install must overwrite in place (the app's startup cleanup of the
        # over-packed v1.0.0 release depends on that layout too).
        run: |
          cp LICENSE publish/${{ matrix.rid }}/
          cd publish/${{ matrix.rid }}

          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r ../../Barnyard-${{ github.ref_name }}-${{ matrix.rid }}.zip .
          else
            tar -czf ../../Barnyard-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Barnyard-${{ matrix.rid }}
          path: |
            *.zip
            *.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
